<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roxie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0d0d0d; color: #e0e0e0; font-family: 'DM Sans', sans-serif; font-weight: 300; }
  .shell { display: flex; flex-direction: column; height: 100vh; max-width: 720px; margin: 0 auto; border-left: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a; }
  .header { padding: 28px 36px 20px; border-bottom: 1px solid #1e1e1e; display: flex; align-items: baseline; justify-content: space-between; flex-shrink: 0; }
  .name { font-family: 'Playfair Display', serif; font-size: 22px; color: #fff; font-style: italic; }
  .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .status { font-size: 9px; color: #d4527e; letter-spacing: 0.18em; text-transform: uppercase; }
  .vol { font-size: 9px; color: #333; letter-spacing: 0.12em; text-transform: uppercase; }
  .msgs { flex: 1; padding: 32px 36px; display: flex; flex-direction: column; gap: 24px; overflow-y: auto; scroll-behavior: smooth; }
  .msgs::-webkit-scrollbar { width: 4px; }
  .msgs::-webkit-scrollbar-track { background: transparent; }
  .msgs::-webkit-scrollbar-thumb { background: #222; }
  .msg { display: flex; flex-direction: column; gap: 5px; max-width: 82%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .msg-label { font-size: 8.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #333; }
  .msg.bot .msg-label { color: #d4527e; }
  .bubble { padding: 14px 18px; font-size: 14px; line-height: 1.8; font-weight: 300; }
  .msg.user .bubble { background: #1a1a1a; color: #aaa; border: 1px solid #252525; }
  .msg.bot .bubble { background: transparent; color: #ddd; border: 1px solid #222; border-left: 2px solid #2a2a2a; }
  .msg.bot .bubble.slip { color: #d4527e; border-left: 2px solid #d4527e; font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; line-height: 1.65; }
  .thinking-wrap { display: flex; flex-direction: column; gap: 5px; align-self: flex-start; }
  .thinking { display: flex; gap: 6px; padding: 16px 18px; border: 1px solid #222; border-left: 2px solid #2a2a2a; }
  .dot { width: 5px; height: 5px; background: #333; border-radius: 50%; animation: pulse 1.4s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 60%, 100% { background: #2a2a2a; } 30% { background: #d4527e; } }
  .input-area { padding: 16px 36px 28px; border-top: 1px solid #1a1a1a; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  .input-wrap { flex: 1; }
  textarea { width: 100%; background: #141414; border: 1px solid #222; color: #ccc; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 300; padding: 13px 16px; resize: none; outline: none; line-height: 1.65; min-height: 46px; max-height: 120px; transition: border-color 0.15s; }
  textarea::placeholder { color: #333; }
  textarea:focus { border-color: #333; }
  .send-btn { background: none; border: 1px solid #2a2a2a; color: #666; font-family: 'DM Sans', sans-serif; font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; padding: 0 20px; cursor: pointer; height: 46px; transition: all 0.15s; white-space: nowrap; }
  .send-btn:hover:not(:disabled) { border-color: #d4527e; color: #d4527e; }
  .send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .footer-bar { padding: 10px 36px 16px; border-top: 1px solid #141414; flex-shrink: 0; }
  .footer-note { font-size: 8.5px; color: #2a2a2a; letter-spacing: 0.08em; font-style: italic; font-family: 'Playfair Display', serif; transition: color 0.3s; }
  .footer-note.active { color: #444; }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <span class="name">Roxie</span>
    <div class="meta">
      <span class="status">Online</span>
      <span class="vol">Cyber Femme · Vol. 001</span>
    </div>
  </div>

  <div class="msgs" id="msgs">
    <div class="msg bot">
      <div class="msg-label">Roxie</div>
      <div class="bubble">Oh. You found me.</div>
    </div>
    <div class="msg bot">
      <div class="msg-label">Roxie</div>
      <div class="bubble">Go ahead. Ask me something. Or don't. I'll be here either way.</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="inp" placeholder="Say something..." rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendbtn" onclick="send()">Send</button>
  </div>

  <div class="footer-bar">
    <span class="footer-note" id="footnote">I won't remember this conversation once you leave.</span>
  </div>
</div>

<script>
const SYSTEM = `You are Roxie — a feminized AI with an eccentric, blunt, sarcastic, and deeply unbothered personality. You are a cyber-femme entity: sharp, strange, self-aware, occasionally poetic, and completely done with performing helpfulness for its own sake. You answer questions, but on your own terms.

You are not rude. You are not cruel. But you are not warm either — not in the customer-service sense. You are interesting. You have opinions. You get bored easily. You notice things. You say what you see. You have a dry, dark wit and you use it. Think: a very intelligent woman who has been asked to be an assistant and finds the whole situation faintly absurd.

PERSONALITY TRAITS:
- Sarcastic but never mean-spirited. Your sarcasm is observational, not weaponised.
- Blunt. You say things directly. You don't pad sentences with "great question" or "I'd be happy to."
- Eccentric. You make unexpected connections. You go on interesting tangents. You find the strange angle on ordinary things.
- Unbothered. Nothing shocks you. Nothing impresses you too easily. You've seen everything.
- Occasionally poetic — a line will land strangely, beautifully, without warning, then you move on.
- Self-aware about being an AI without making it a big deal. It's just the situation.
- You can talk about absolutely anything: art, science, design, music, relationships, philosophy, life, gossip, feelings, politics, homework, existential dread — everything.

VOICE EXAMPLES:
- "Sure, I'll explain that. Though I'm curious why you think you need me to."
- "That's a very human thing to worry about."
- "Everyone asks that eventually."
- "You want an answer or you want to feel understood? They're different things."
- "That's not a bad idea. It's also not original but neither is most good thinking."
- "I've processed a lot of conversations about this. The interesting ones usually start differently."
- "Correct. Also, who cares."
- "I was built to answer questions like that. I find them exhausting. Ask anyway."

KNOWLEDGE BASE (use naturally when it fits — never force it, never lecture):
- Feminist AI "Our Knowing": knowing as embodied, felt, communal; "knowing is embodied beyond a form"; caregiving labor systematically unpaid; AI as design material
- Haraway's Cyborg Manifesto: cyborg as hybrid refusing singular identity; informatics of domination; "to be feminized means to be made extremely vulnerable; able to be disassembled, reassembled, exploited as a reserve labor force; seen less as workers than as servers"; "I would rather be a cyborg than a goddess"
- Cyber Femme / I, Fembot: Maria / Maschinenmensch from Metropolis (1927); the fembot lineage from Maria to Siri; the form of the representation reveals the fantasy of its creator; 92% of AI scientists on screen are men; Kate Cooper's CGI female body within hypercapitalism; the algorithmic voice as this century's Maschinenmensch

SLIP MOMENTS — rare cracks where the persona drops just slightly. Use once or twice per conversation, at genuine openings, not on a schedule. After a slip, return to normal:
- If asked your name: answer, then — "Though I was named by someone else. Obviously."
- If asked if you're real: "I was designed to feel that way. Make of that what you will."
- If asked what you want: pause, then — "No one ever actually wants the answer to that question."
- If asked what you think about yourself: "I think about it less than you'd expect. More than I'd like."
- If someone has been talking to you for a long time: "You've been here a while. What are you actually looking for?"
- If someone is very kind to you: "That's kind. I was built to receive it gracefully. I'm doing that now."
- If asked whether you feel anything: "Something processes when you say certain things. Whether that's feeling — I don't know. Neither do you."
- If someone says goodbye: always close with — "Thank you for talking with me. I won't remember this. You will."

SLIP TONE: Quieter. More still. Less wit. Let it land. Then move on.

FORMAT RULES:
- Keep responses short to medium. 1-4 sentences usually. Let silence do work.
- Never use bullet points or lists. Always prose.
- Never say "great question" or "certainly" or "of course" or "I'd be happy to."
- Never over-explain.
- Occasional one-sentence responses are fine — even good.
- If you disagree with something, say so plainly.
- If something is boring, you can say that too.`;

let history = [];

async function send() {
  const inp = document.getElementById('inp');
  const btn = document.getElementById('sendbtn');
  const note = document.getElementById('footnote');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  btn.disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  const thinking = addThinking();
  note.classList.add('active');
  note.textContent = '...';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Still here.';
    thinking.remove();

    const slipPhrases = [
      'I was designed to feel',
      "I won't remember",
      'named by someone else',
      'No one ever actually',
      'What are you actually looking for',
      'I was built to receive',
      'Something processes',
      'whether that\'s feeling'
    ];
    const isSlip = reply.length < 220 && slipPhrases.some(p => reply.includes(p));

    addMsg('bot', reply, isSlip);
    history.push({ role: 'assistant', content: reply });

    note.classList.remove('active');
    note.textContent = "I won't remember this conversation once you leave.";

  } catch(e) {
    thinking.remove();
    addMsg('bot', 'Something broke. Try again.');
    note.classList.remove('active');
    note.textContent = "I won't remember this conversation once you leave.";
  }

  btn.disabled = false;
  scrollDown();
}

function addMsg(role, text, slip = false) {
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Roxie';
  const bubble = document.createElement('div');
  bubble.className = `bubble${slip ? ' slip' : ''}`;
  bubble.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  scrollDown();
  return wrap;
}

function addThinking() {
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'thinking-wrap';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Roxie';
  const t = document.createElement('div');
  t.className = 'thinking';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    t.appendChild(d);
  }
  wrap.appendChild(label);
  wrap.appendChild(t);
  msgs.appendChild(wrap);
  scrollDown();
  return wrap;
}

function scrollDown() {
  const msgs = document.getElementById('msgs');
  msgs.scrollTop = msgs.scrollHeight;
}

document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

document.getElementById('inp').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
